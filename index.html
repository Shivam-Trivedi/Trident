<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trident Sports Club</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>Trident Sports Club</h1>

<p class="subtitle">Register for Training</p>

<div class="card">⚽ Football Training</div>
<div class="card">🏏 Cricket Training</div>
<div class="card">🎾 Tennis Training</div>

<div class="booking">

<h2>Book Training</h2>

<form id="bookingForm">

<input type="text" id="name" placeholder="Name" required>

<input type="tel" id="phone" placeholder="Mobile Number" required>

<input type="email" id="email" placeholder="Email" required>

<button type="submit">Book Now</button>

</form>

</div>

</div>

<script src="booking.js"></script>

</body>
</html>
